name: CF Bot

on:
  schedule:
    - cron: '30 12 * * *'      # 6 PM IST → daily problems
    - cron: '*/30 * * * *'     # every 30 minutes → contest check
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          RUN_DAILY: ${{ github.event.schedule == '30 12 * * *' && 'true' || 'false' }}
        run: python bot.py

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add used_problems.json reminded_contests.json
          git commit -m "Update state files" || echo "No changes"
          git push